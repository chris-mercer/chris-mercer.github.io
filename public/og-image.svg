<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Asymmetric radial gradient background -->
    <radialGradient id="bgGradient" cx="25%" cy="35%" r="85%">
      <stop offset="0%" stop-color="#262220"/>
      <stop offset="50%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0f0e0c"/>
    </radialGradient>

    <!-- Subtle vertical grid lines -->
    <pattern id="gridLines" width="100" height="630" patternUnits="userSpaceOnUse">
      <line x1="100" y1="0" x2="100" y2="630" stroke="#2dd4bf" stroke-width="0.5" opacity="0.05"/>
    </pattern>

    <!-- Subtle horizontal grid lines -->
    <pattern id="hGridLines" width="1200" height="80" patternUnits="userSpaceOnUse">
      <line x1="0" y1="80" x2="1200" y2="80" stroke="#2dd4bf" stroke-width="0.5" opacity="0.03"/>
    </pattern>

    <!-- Horizontal accent line gradient (fades at edges) -->
    <linearGradient id="accentLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset="15%" stop-color="#2dd4bf" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#2dd4bf" stop-opacity="0.35"/>
      <stop offset="85%" stop-color="#2dd4bf" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>

    <!-- CTA button gradient -->
    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>

    <!-- Subtle corner glow -->
    <radialGradient id="cornerGlow" cx="0%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#gridLines)"/>
  <rect width="1200" height="630" fill="url(#hGridLines)"/>

  <!-- Corner glow (top-left) -->
  <rect width="600" height="400" fill="url(#cornerGlow)"/>

  <!-- Horizontal accent line -->
  <line x1="0" y1="430" x2="1200" y2="430" stroke="url(#accentLineGrad)" stroke-width="1"/>

  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="1199" height="629" rx="0" fill="none" stroke="#2dd4bf" stroke-width="1" opacity="0.08"/>

  <!-- === CONTENT === -->

  <!-- Avatar circle (CM monogram) -->
  <circle cx="600" cy="155" r="48" fill="#262220" stroke="#2dd4bf" stroke-width="1.5" opacity="0.9"/>
  <text x="600" y="170" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="28" font-weight="700" fill="#f0eeeb" letter-spacing="1">CM</text>

  <!-- Name -->
  <text x="600" y="250" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="38" font-weight="700" fill="#f0eeeb">Christopher Mercer</text>

  <!-- Role -->
  <text x="600" y="290" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="500" fill="#a8a29e" letter-spacing="2">TECHNICAL PRODUCT · INSTITUTIONAL DIGITAL ASSETS</text>

  <!-- Badges: 2x2 grid, one per flagship competency -->
  <!-- Row 1, Badge 1: Institutional-Scale Financial Operations -->
  <rect x="327.5" y="330" width="300" height="34" rx="17" fill="#2dd4bf" fill-opacity="0.08" stroke="#2dd4bf" stroke-opacity="0.15" stroke-width="1"/>
  <text x="477.5" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="500" fill="#2dd4bf" opacity="0.85">Institutional-Scale Financial Operations</text>

  <!-- Row 1, Badge 2: End-to-End Product Ownership -->
  <rect x="647.5" y="330" width="225" height="34" rx="17" fill="#2dd4bf" fill-opacity="0.08" stroke="#2dd4bf" stroke-opacity="0.15" stroke-width="1"/>
  <text x="760" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="500" fill="#2dd4bf" opacity="0.85">End-to-End Product Ownership</text>

  <!-- Row 2, Badge 3: Shipping Regulated Financial Products -->
  <rect x="340" y="376" width="285" height="34" rx="17" fill="#2dd4bf" fill-opacity="0.08" stroke="#2dd4bf" stroke-opacity="0.15" stroke-width="1"/>
  <text x="482.5" y="398" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="500" fill="#2dd4bf" opacity="0.85">Shipping Regulated Financial Products</text>

  <!-- Row 2, Badge 4: Modern, AI-Native Delivery -->
  <rect x="645" y="376" width="215" height="34" rx="17" fill="#2dd4bf" fill-opacity="0.08" stroke="#2dd4bf" stroke-opacity="0.15" stroke-width="1"/>
  <text x="752.5" y="398" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="500" fill="#2dd4bf" opacity="0.85">Modern, AI-Native Delivery</text>

  <!-- CTA Button -->
  <rect x="460" y="455" width="280" height="48" rx="24" fill="url(#ctaGrad)"/>
  <text x="600" y="485" text-anchor="middle" font-family="'Instrument Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#1c1917">Explore My Work</text>

  <!-- Tagline below CTA -->
  <text x="600" y="535" text-anchor="middle" font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" font-weight="400" fill="#a8a29e" opacity="0.7">Institutional-grade blockchain infrastructure, owned end to end</text>

  <!-- URL bottom-right -->
  <text x="1150" y="600" text-anchor="end" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="400" fill="#a8a29e" opacity="0.5">christophermercer.org</text>
</svg>
