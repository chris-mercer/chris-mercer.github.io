<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>Page Not Found | Christopher Mercer</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <meta name="theme-color" content="#f0eeeb">
  <meta name="color-scheme" content="light dark">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f0eeeb;
      --text: #1c1917;
      --text-secondary: #57534e;
      --accent: #2dd4bf;
      --accent-hover: #14b8a6;
      --accent-text: #1c1917;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0e0c;
        --text: #f0eeeb;
        --text-secondary: #a8a29e;
        --accent: #2dd4bf;
        --accent-hover: #5eead4;
        --accent-text: #1c1917;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.25rem;
      -webkit-font-smoothing: antialiased;
    }

    .name {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(1.75rem, 1.4rem + 1.5vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.65;
      color: var(--text-secondary);
      margin-bottom: 1.75rem;
      max-width: 32rem;
    }

    .cta-button {
      display: inline-block;
      background: var(--accent);
      color: var(--accent-text);
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      padding: 0.75rem 2rem;
      border-radius: 100px;
      transition: background-color 0.15s ease, transform 0.15s ease;
    }

    .cta-button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .cta-button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <p class="name">Christopher Mercer</p>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has moved.</p>
  <a href="/" class="cta-button">Back to homepage</a>
</body>
</html>
